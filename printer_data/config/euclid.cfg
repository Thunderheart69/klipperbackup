[gcode_macro PROBE_DEPLOY]
description: Påminn om att sätta på proben
gcode:
    RESPOND MSG="⚠ Sätt på Euclid Probe och tryck Resume"
    PAUSE

[gcode_macro PROBE_STOW]
description: Påminn om att ta av proben
gcode:
    RESPOND MSG="✅ Ta av Euclid Probe och tryck Resume"
    PAUSE

[gcode_macro BED_LEVEL]
description: Nivellering med manuell probe
gcode:
    G28 X Y
    PROBE_DEPLOY
    G28 Z
    BED_MESH_CALIBRATE
    PROBE_STOW
    G28 Z